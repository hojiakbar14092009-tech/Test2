<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Book Master login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-300 h-screen w-full">

    <div class=" absolute left-135 top-40 w-85 h-85 bg-white p-7 shadow-xl rounded-2xl hover:scale-[1.01] duration-300 ">
        <div>
            <h1 class="serif-title text-center font-extrabold text-3xl text-amber-900 tracking-wide">Book Master</h1>
            <p class="text-center text-xs text-stone-400 mt-1">Bilimlar olamiga xush kelibsiz</p>
            
            <p id="error" class="text-red-500 text-xs text-center mt-3 font-medium empty:hidden bg-red-50 py-1.5 px-2 rounded-lg border border-red-100"></p>
        </div>

        <div class="pt-5">
             <form id="form" class="space-y-4">

                <div class="space-y-1">
                    <input id="login" type="text" placeholder="Login" 
                           class="border border-stone-300 bg-stone-50/50 rounded-xl p-3 w-full text-stone-800 placeholder-stone-400 outline-none transition-all duration-300 hover:border-amber-700 focus:border-amber-800 focus:ring-4 focus:ring-amber-800/10 text-sm">
                </div>
  
                <label class="text-red-500 text-xs block pl-1 font-medium empty:hidden" id="loginLable" for="login"></label>

                <div class="space-y-1">
                   <input id="pwd" type="password" placeholder="Parol" 
                          class="border border-stone-300 bg-stone-50/50 rounded-xl p-3 w-full text-stone-800 placeholder-stone-400 outline-none transition-all duration-300 hover:border-amber-700 focus:border-amber-800 focus:ring-4 focus:ring-amber-800/10 text-sm">
                </div>

                <label class="text-red-500 text-xs block pl-1 font-medium empty:hidden" id="pwdLable" for="pwd"></label>

                <div class="pt-2">
                    <button type="submit" class="text-white font-semibold w-full text-center p-3.5 bg-amber-800 hover:bg-amber-900 active:scale-[0.98] transition-all duration-200 rounded-xl shadow-md shadow-amber-800/20 cursor-pointer text-sm tracking-wide">
                        Kirish
                    </button>
                </div>

            </form> 
            
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
